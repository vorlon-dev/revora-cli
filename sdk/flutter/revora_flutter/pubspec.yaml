name: revora_flutter
description: Flutter plugin for Revora OTA updates.
version: 0.0.1
homepage: https://revora.dev

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.example.revora_flutter
        pluginClass: RevoraFlutterPlugin
      ios:
        pluginClass: RevoraFlutterPlugin
